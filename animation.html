<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            height: 200px;
            width: 200px;
            background-color: aqua;
            display: none;
        }
        .box2{
            height: 200px;
            width: 200px;
            background-color: rgb(47, 0, 255);
            display: none;
        }
        .box3{
            height: 200px;
            width: 200px;
            background-color: rgba(179, 255, 0, 0.932);
            display: none;
        }
    </style>
</head>
<body>
    
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quidem vero sapiente mollitia fuga, a velit porro! Temporibus libero vitae esse tenetur, magnam fugiat laudantium dolor perspiciatis voluptas quibusdam hic laboriosam.</p>
    <button id="h">Hide</button>
    <button id="s">show</button>

    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>

    <button id="fn">fadein</button>
    <button id="fo">fadeout</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>

        $("#h").click(function(){
            $("p").hide();
        })
        $("#s").click(function(){
            $("p").show();
        })


        $("#fn").click(function(){
            $(".box1").fadeIn();
            $(".box2").fadeIn("slow");
            $(".box3").fadeIn(3000);


        })
        $("#fo").click(function(){
            $(".box1").fadeOut();
            $(".box2").fadeOut("slow");
            $(".box3").fadeOut(3000);
        })
        



    </script>
</body>
</html>
